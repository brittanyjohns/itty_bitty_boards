name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # Detect whether the change touches anything other than docs. Markdown,
  # docs/, and LICENSE are docs-only; everything else is "code". The expensive
  # RSpec matrix is skipped on docs-only changes, but the required `rspec`
  # gate job still runs and reports success, so branch protection isn't
  # deadlocked (a workflow that never runs leaves a required check pending
  # forever). Fail-safe: if we can't determine the changed files, run full CI.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect non-docs changes
        id: filter
        run: |
          set -uo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE='${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}'
          else
            BASE='${{ github.event.before }}'
            if ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
              echo "No usable base commit; running full CI."
              echo "code=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            RANGE="${BASE}...${{ github.sha }}"
          fi

          FILES=$(git diff --name-only "$RANGE" 2>/dev/null)
          if [ $? -ne 0 ] || [ -z "$FILES" ]; then
            echo "Could not determine changed files; running full CI."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files:"
          echo "$FILES"

          CODE=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              *.md|docs/*|LICENSE) ;;   # docs-only — ignore
              *) CODE=true ;;
            esac
          done <<< "$FILES"

          echo "Non-docs (code) changes present: $CODE"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"

  rspec-shard:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ci_node_index: [0, 1, 2]
        ci_node_total: [3]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: itty_bitty_boards_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/itty_bitty_boards_test_${{ matrix.ci_node_index }}
      # Dummy secrets so boot doesn't require config/master.key or real keys
      # in CI. Initializers that ENV.fetch these will read the dummies.
      SECRET_KEY_BASE: dummy-ci-secret-key-base-not-used-in-prod
      DEVISE_JWT_SECRET_KEY: dummy-ci-devise-jwt-secret-key-not-used-in-prod
      RAILS_MASTER_KEY: ""

    steps:
      - uses: actions/checkout@v4

      # Active Storage variant processing loads libvips at runtime. Without
      # it, specs that attach images raise LoadError: cannot open vips.so.42.
      # Azure mirrors are intermittently slow (10-18 min stalls), so we cache
      # the installed debs across runs. Cache key includes the runner image
      # version so a new image busts the cache cleanly.
      - name: Cache libvips apt packages
        id: cache-libvips
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: apt-libvips-${{ runner.os }}-${{ runner.arch }}-v1

      - name: Install libvips
        run: |
          if dpkg -s libvips42t64 &>/dev/null; then
            echo "libvips42t64 already installed"
          elif [ -d ~/apt-cache ]; then
            echo "Restoring libvips from cache"
            sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
            sudo dpkg -i ~/apt-cache/*.deb 2>/dev/null \
              || sudo apt-get install -y --no-install-recommends --fix-broken
          else
            echo "Cold install — downloading libvips"
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends libvips42t64 \
              || sudo apt-get install -y --no-install-recommends libvips42
            mkdir -p ~/apt-cache
            cp /var/cache/apt/archives/lib{vips,cgif,exif,hdf5,hwy,imagequant,imath,jxl,matio,openexr,openslide,poppler,rsvg,spng,aec,sz}*.deb ~/apt-cache/ 2>/dev/null || true
            cp /var/cache/apt/archives/poppler-data*.deb ~/apt-cache/ 2>/dev/null || true
          fi

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.0
          bundler-cache: true

      - name: Create test database
        run: |
          PGPASSWORD=postgres createdb -h localhost -U postgres itty_bitty_boards_test_${{ matrix.ci_node_index }}

      - name: Prepare test database
        run: bin/rails db:schema:load

      - name: RSpec (shard ${{ matrix.ci_node_index }}/${{ matrix.ci_node_total }})
        run: |
          FILES=$(find spec -name '*_spec.rb' | sort | awk "NR % ${{ matrix.ci_node_total }} == ${{ matrix.ci_node_index }}")
          FAIL_FAST=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FAIL_FAST="--fail-fast"
          fi
          echo "Running $(echo "$FILES" | wc -l | tr -d ' ') spec files (shard ${{ matrix.ci_node_index }})"
          bundle exec rspec $FAIL_FAST $FILES

  # Required status check. Always runs so branch protection gets a reported
  # result. On docs-only changes the shards are skipped and this passes.
  rspec:
    needs: [changes, rspec-shard]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check shard results
        run: |
          if [ "${{ needs.changes.outputs.code }}" != "true" ]; then
            echo "Docs-only change — RSpec shards skipped, passing."
            exit 0
          fi
          if [ "${{ needs.rspec-shard.result }}" != "success" ]; then
            echo "One or more RSpec shards failed"
            exit 1
          fi
