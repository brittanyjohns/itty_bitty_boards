name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rspec-shard:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ci_node_index: [0, 1, 2]
        ci_node_total: [3]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: itty_bitty_boards_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/itty_bitty_boards_test_${{ matrix.ci_node_index }}
      # Dummy secrets so boot doesn't require config/master.key or real keys
      # in CI. Initializers that ENV.fetch these will read the dummies.
      SECRET_KEY_BASE: dummy-ci-secret-key-base-not-used-in-prod
      DEVISE_JWT_SECRET_KEY: dummy-ci-devise-jwt-secret-key-not-used-in-prod
      RAILS_MASTER_KEY: ""

    steps:
      - uses: actions/checkout@v4

      # Active Storage variant processing (Doc#tile_url and friends) loads
      # libvips at runtime via ruby-vips. Without it, any spec that attaches
      # an image and touches a Doc raises LoadError: cannot open vips.so.42.
      # Package name differs across Ubuntu versions: 24.04 ships libvips42t64
      # (time_t transition), 22.04 ships libvips42. Try the newer name first.
      - name: Install libvips
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips42t64 || sudo apt-get install -y libvips42

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.0
          bundler-cache: true

      - name: Create test database
        run: |
          PGPASSWORD=postgres createdb -h localhost -U postgres itty_bitty_boards_test_${{ matrix.ci_node_index }}

      - name: Prepare test database
        run: bin/rails db:schema:load

      - name: RSpec (shard ${{ matrix.ci_node_index }}/${{ matrix.ci_node_total }})
        run: |
          FILES=$(find spec -name '*_spec.rb' | sort | awk "NR % ${{ matrix.ci_node_total }} == ${{ matrix.ci_node_index }}")
          FAIL_FAST=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FAIL_FAST="--fail-fast"
          fi
          echo "Running $(echo "$FILES" | wc -l | tr -d ' ') spec files (shard ${{ matrix.ci_node_index }})"
          bundle exec rspec $FAIL_FAST $FILES

  rspec:
    needs: rspec-shard
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check shard results
        run: |
          if [ "${{ needs.rspec-shard.result }}" != "success" ]; then
            echo "One or more RSpec shards failed"
            exit 1
          fi
