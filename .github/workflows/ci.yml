name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rspec:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: itty_bitty_boards_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/itty_bitty_boards_test
      # Dummy secrets so boot doesn't require config/master.key or real keys
      # in CI. Initializers that ENV.fetch these will read the dummies.
      SECRET_KEY_BASE: dummy-ci-secret-key-base-not-used-in-prod
      DEVISE_JWT_SECRET_KEY: dummy-ci-devise-jwt-secret-key-not-used-in-prod
      RAILS_MASTER_KEY: ""

    steps:
      - uses: actions/checkout@v4

      # Active Storage variant processing (Doc#tile_url and friends) loads
      # libvips at runtime via ruby-vips. Without it, any spec that attaches
      # an image and touches a Doc raises LoadError: cannot open vips.so.42.
      # Package name differs across Ubuntu versions: 24.04 ships libvips42t64
      # (time_t transition), 22.04 ships libvips42. Try the newer name first.
      - name: Install libvips
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips42t64 || sudo apt-get install -y libvips42

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.0
          bundler-cache: true

      - name: Prepare test database
        run: bin/rails db:schema:load

      - name: RSpec
        run: bundle exec rspec
