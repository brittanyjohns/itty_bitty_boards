name: Security

on:
  push:
    branches: [main]
  pull_request:

jobs:
  brakeman:
    name: Brakeman static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle exec brakeman --no-pager --ignore-config config/brakeman.ignore

  bundler-audit:
    name: Bundler audit (known CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      # All ignored CVEs require Rails >= 7.2.3.1 / 8.0.4.1 / 8.1.2.1; no 7.1.x patch
      # exists (Rails 7.1 reached EOL 2025-10-01). Tracked in
      # https://github.com/brittanyjohns/itty_bitty_boards/issues/56 — remove these
      # ignores once the Rails upgrade is merged.
      #   CVE-2026-33168  actionview
      #   CVE-2026-33169  activesupport ReDoS (number_to_delimited)
      #   CVE-2026-33170  activesupport XSS (SafeBuffer#%)
      #   CVE-2026-33173  activestorage content-type bypass (direct uploads)
      #   CVE-2026-33174  activestorage DoS (proxy mode Range requests)
      #   CVE-2026-33176  activesupport DoS (number helpers)
      #   CVE-2026-33195  activestorage path traversal (DiskService)
      #   CVE-2026-33202  activestorage glob injection (DiskService)
      #   CVE-2026-33658  activestorage DoS (proxy mode multi-range)
      #
      # The two puma CVEs below are PROXY protocol v1 parser bugs, only
      # reachable when a `bind` enables `proxy_protocol`. config/puma.rb binds
      # by plain port (nginx proxies over normal HTTP), so they are not
      # exploitable here. The fix is a major puma bump (6.5.0 -> 7.2.1+/8.0.2+);
      # tracked in https://github.com/brittanyjohns/itty_bitty_boards/issues/266
      # — remove these two ignores once that upgrade merges.
      #   CVE-2026-47736  puma PROXY protocol v1 parser memory exhaustion
      #   CVE-2026-47737  puma PROXY protocol v1 repeated headers (keep-alive)
      #
      # excon < 1.5.0 leaks sensitive headers on redirect. Pinned to < 1 by
      # MailchimpMarketing gem; only used for server-to-server Mailchimp API
      # calls (no user-controlled redirects). Remove once MailchimpMarketing
      # supports excon >= 1.x.
      #   CVE-2026-54171  excon header leak on redirect
      - run: |
          bundle exec bundler-audit check --update \
            --ignore CVE-2026-33168 CVE-2026-33169 CVE-2026-33170 \
                     CVE-2026-33173 CVE-2026-33174 CVE-2026-33176 \
                     CVE-2026-33195 CVE-2026-33202 CVE-2026-33658 \
                     CVE-2026-47736 CVE-2026-47737 \
                     CVE-2026-54171
