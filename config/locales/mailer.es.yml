      quickstart_item_3: "Invita a un Acompañante para que alguien más pueda ayudar (profesor/cuidador/terapeuta)."
      quickstart_item_4: "Exporta un tablero como PDF + QR para acceder fácilmente desde cualquier lugar."
      compare_heading: "¿Estás pensando en Pro?"
      compare_col_feature: "Función"
      compare_col_basic: "Basic"
      compare_col_pro: "Pro"
      compare_feature_myspeak: "MySpeak+ (Información de seguridad + acceso instantáneo)"
      compare_feature_comm: "Cuentas de comunicador (usuario + contraseña)"
      compare_feature_boards: "Tableros personalizados"
      compare_feature_supporters: "Cuentas de Acompañante"
      compare_feature_pdf: "Exportar tableros como PDF + QR"
