  partner_mailer:
    welcome_email:
      subject: "¡Te damos la bienvenida al Programa de Socios de SpeakAnyWay!"
      title: "Te damos la bienvenida a SpeakAnyWay"
      greeting_html: "Hola <strong>%{name}</strong>,"
      intro_html: "¡Me emociona mucho darte oficialmente la bienvenida al <strong>Programa Piloto de Socios de SpeakAnyWay</strong>! 💜 Eres parte de un pequeño grupo seleccionado a mano que nos ayuda a dar forma a lo que este programa — y esta comunidad — llegará a ser."
      pilot_note: "Estas primeras rondas son pilotos, lo que significa que algunas cosas pueden cambiar o mejorar en el camino. Gracias por ser flexible, curiosa/o y abierta/o con tus comentarios mientras crecemos juntos. Realmente no podríamos hacer esto sin ti."
      signin_intro: "Puedes iniciar sesión en tu cuenta en cualquier momento haciendo clic en el siguiente enlace:"
      signin_link: "Inicia sesión en tu cuenta"
      youre_in: "Ya estás oficialmente dentro — ¡vamos a explorar!"
      step1_heading: "💡 Paso 1: Orientación (Cuentas de Comunicador Patrocinadas vs Demo)"
      step1_intro: "Dentro de SpeakAnyWay Pro verás dos tipos de Cuentas de Comunicador. Ambas son útiles — solo están pensadas para situaciones distintas:"
      sponsored_heading: "✅ Cuentas de Comunicador Patrocinadas (asientos completos)"
      sponsored_intro: "Úsalas cuando estás apoyando activamente a un estudiante/cliente y quieres mantener su acceso y progreso por separado."
      sponsored_item_1_html: "<strong>Inicio de sesión separado</strong> para el comunicador (puede iniciar sesión en su propio dispositivo)"
      sponsored_item_2_html: "<strong>Estadísticas y analítica</strong> (uso, tendencias, progreso)"
      sponsored_item_3_html: "<strong>Control total</strong> sobre tableros, configuración y accesos"
      sponsored_item_4_html: "<strong>Invitar a personas de apoyo/supervisión</strong> (docentes, asistentes, familiares, terapeutas)"
      demo_heading: "🧪 Cuentas de Comunicador Demo (Compartir + Colaborar)"
      demo_intro: "Úsalas cuando quieras crear o previsualizar tableros, colaborar o compartir recursos — sin crear un asiento patrocinado completo."
      demo_can_label: "Las cuentas Demo SÍ pueden:"
      demo_can_item_1_html: "<strong>Compartir tableros</strong> y contenido"
      demo_can_item_2_html: "<strong>Invitar a personas de apoyo/supervisión</strong> para colaborar"
      demo_not_label: "Las cuentas Demo NO incluyen:"
      demo_not_item_1: "Estadísticas / analítica"
      demo_not_item_2: "Un inicio de sesión separado para el comunicador"
      demo_not_item_3: "Funciones de MySpeak+"
      rule_of_thumb_html: "<strong>Regla rápida:</strong> Si es un estudiante/cliente real a quien apoyas a largo plazo → usa un asiento <strong>Patrocinado</strong>. Si es para previsualizar, crear, compartir o \"déjame mostrarte cómo funciona esto\" → usa un asiento <strong>Demo</strong>."
      step2_heading: "💡 Paso 2: Cuentas MySpeak (opcionales, pero potentes)"
      step2_intro_html: "Cada Cuenta de Comunicador también puede tener un perfil opcional de <strong>MySpeak</strong> que guarda detalles de emergencia, contactos e información de seguridad. Cada uno incluye un código QR escaneable y se conecta sin problemas con los tableros del comunicador."
      step2_combo_html: "Juntas, estas cuentas muestran cómo SpeakAnyWay combina <strong>comunicación + seguridad</strong> en un solo sistema."
      step2_seats_html: "<strong>Se incluyen 3 Cuentas de Comunicador Patrocinadas</strong> — si necesitas más, solo dinos."
      step2_outreach: "♾️ ¿Tienes actualmente estudiantes o clientes que necesitan CAA pero no tienen acceso o tienen acceso limitado? Por favor contáctanos — nos encantaría trabajar contigo para ayudarles a conseguir lo que necesitan. 🫶"
      step2_etsy: "Visita nuestra tienda en Etsy para recursos de CAA imprimibles, etiquetas de identificación, stickers, tatuajes y más."
      step3_heading: "🚀 Paso 3: Explora el Portal de Socios"
      step3_intro: "El Portal de Socios incluye guías paso a paso, consejos por rol y el formulario oficial de comentarios:"
      step3_cta: "IR AL PORTAL DE SOCIOS"
      first_things_heading: "Primeras cosas sugeridas para probar:"
      first_things_item_1: "Crear un tablero de Comunicador de ejemplo usando Sugerencias de IA"
      first_things_item_2: "Exportar un PDF con un código QR rápido y escanearlo en otro dispositivo"
      first_things_item_3: "Crear una cuenta MySpeak para ver cómo se muestra la información de contacto de emergencia al escanear"
      feedback_heading: "💭 Expectativas de comentarios"
      feedback_item_1: "Un breve formulario de comentarios por mes (5-10 minutos)"
      feedback_item_2: "Reportes opcionales de funciones o bugs mientras exploras SpeakAnyWay"
      feedback_item_3: "Encuestas o check-ins rápidos ocasionales para guiar las mejoras"
      feedback_outro: "También enviaremos breves actualizaciones semanales durante el piloto. Puedes responder en cualquier momento con comentarios o ideas — sin presión, solo comunicación abierta."
      dates_heading: "🗓️ Tu ronda de Socio de 3 meses"
      dates_label: "Fechas:"
      dates_value: "%{start_date} - %{end_date}"
      dates_followup: "Haremos un seguimiento cerca del final para revisar resultados e invitarte a renovar, volver a postular o avanzar al siguiente nivel para la próxima ronda."
      help_html: "💌 <strong>¿Necesitas ayuda?</strong> Solo responde a este correo — ¡estamos aquí para ti!"
      quick_note_html: "<strong>Una nota rápida:</strong><br />Esta es nuestra primerísima Ronda de Socios y estamos aprendiendo justo contigo. Algunas cosas pueden cambiar o mejorar — gracias por tu paciencia, flexibilidad y por ser parte de construir algo completamente nuevo."
      voice_html: "Tu voz dará forma directa al futuro del <strong>Programa de Socios de SpeakAnyWay</strong>. 💜"
      thanks: "¡Gracias por unirte al camino!"
      signature: "Brittany"

