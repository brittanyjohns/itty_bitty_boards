      footer_signature: "— El equipo de SpeakAnyWay"
      footer_visit: "Visita nuestro sitio web"

    welcome_pro_email:
      subject: "Bienvenido a SpeakAnyWay AAC — plan Pro"
      title: "Bienvenido a SpeakAnyWay Pro 🎉"
      subtitle: "Pensado para familias, aulas y profesionales que apoyan a varios comunicadores."
      greeting_with_name: "Hola %{name},"
      greeting_no_name: "Hola,"
      intro_html: "¡Gracias por elegir <strong>SpeakAnyWay Pro</strong>! Ahora cuentas con herramientas potentes para apoyar la comunicación en casa, la escuela, la terapia y la comunidad."
      demo_heading: "⭐ Nuevo en Pro: Cuentas de Comunicador Demo"
      demo_intro_html: "Tu plan Pro incluye <strong>%{count} Cuentas de Comunicador Demo</strong> para empezar. Están diseñadas específicamente para <strong>modelar, organizar y planificar</strong>, sin necesidad de usuario ni contraseña."
      demo_item_1_html: "<strong>Modela CAA</strong> durante la terapia o la enseñanza sin iniciar sesión"
      demo_item_2_html: "<strong>Organiza tableros</strong> por estudiante, aula, actividad o rutina"
      demo_item_3_html: "Crea <strong>tableros temporales o por lección</strong> (excursiones, temas, eventos)"
      demo_item_4: "Demuestra la CAA con seguridad a familias o equipos sin tocar la cuenta de un niño"
      demo_item_5: "Planifica y crea tableros con antelación, y luego cópialos donde los necesites"
      demo_note: "Los Comunicadores Demo son ideales para SLP, profesores, asistentes y cuidadores que necesitan flexibilidad sin complicaciones."
      included_heading: "✨ Lo que incluye Pro"
      included_paid_html: "<strong>%{count} Cuentas de Comunicador de pago</strong> (usuario + contraseña para cambiar de dispositivo y acceso remoto)"
      included_demo_html: "<strong>%{count} Cuentas de Comunicador Demo</strong> (sin inicio de sesión, ideales para modelar y organizar)"
      included_myspeak_html: "<strong>MySpeak+</strong> para cada Comunicador de pago (acceso público, información médica y de emergencia, acceso instantáneo por QR)"
      included_supporters_html: "<strong>Acompañantes ilimitados</strong> (acceso de solo lectura para profesores, asistentes, cuidadores y familia)"
      included_ai_html: "Acceso completo a las <strong>funciones de IA</strong> (sugerencias de palabras, diseños, generación de tableros)"
      included_analytics_html: "<strong>Analíticas avanzadas</strong> para entender el uso y el progreso"
      included_priority_html: "<strong>Soporte prioritario</strong> cuando necesites ayuda rápido"
      included_pdf_html: "<strong>Exportaciones en PDF + QR</strong> para una CAA portátil en cualquier lugar"
      setup_heading: "🚀 Configúrate en minutos"
      setup_item_1: "Crea Cuentas de Comunicador de pago para cada persona."
      setup_item_2: "Usa Comunicadores Demo para modelar CAA u organizar tableros por tema."
      setup_item_3: "Crea tableros con IA para rutinas, el aula o la comunidad."
      setup_item_4_html: "Exporta tableros como <strong>PDF + QR</strong> para acceso compartido o sin conexión."
      setup_item_5: "Invita a Acompañantes para que todo el equipo esté alineado."
      cta: "Abre tu Panel Pro"
      cta_fallback: "Si el botón no funciona, copia este enlace:"
      tips_heading: "💡 Consejos Pro"
      tips_item_1: "Usa Comunicadores Demo para probar los diseños antes de asignarlos."
      tips_item_2: "Nombra los demos por actividad (p. ej., \"Merienda\", \"Rutina de la mañana\")."
      tips_item_3: "Revisa las analíticas para afinar el vocabulario que se usa en la vida real."
      footer_help_html: "¿Necesitas ayuda, apoyo para empezar o quieres añadir más Comunicadores?<br>Visita <a href=\"https://app.speakanyway.com/pricing\" target=\"_blank\">precios</a> o responde a este correo. También puedes escribirnos a <a href=\"mailto:help@speakanyway.com\">help@speakanyway.com</a>."
      footer_pricing_html: "Precio actual de Pro: <strong>%{pro_price}</strong>. Cancela cuando quieras."
      footer_signature: "— El equipo de SpeakAnyWay 💜"

