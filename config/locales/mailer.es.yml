      greeting_with_name: "Hola %{name},"
      greeting_no_name: "Hola,"
      intro: "Nos alegra mucho que te unas a SpeakAnyWay. Tu perfil de MySpeak ayuda a otras personas a entender cómo te comunicas mejor. Así puedes configurarlo:"
