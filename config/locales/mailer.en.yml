      step_1_html: "<strong>Log in:</strong> Visit %{link} and log into your account."
      step_2_html: "<strong>Go to MySpeak Settings:</strong> Click your profile icon and choose <em>\"MySpeak Settings.\"</em>"
      step_3: "Fill out your info: Add your emergency contacts, allergies, communication preferences, and anything you want others to know."
      step_4: "Generate your QR code: Once your profile is saved, your personal QR code will be created automatically!"
      step_5: "Print or share: You can print your MySpeak QR, add it to stickers, ID cards, or save it on your device."
      outro: "Your MySpeak page makes it easier for others to connect and communicate with you — your way."
      cta: "Your MySpeak Profile"
      support_html: "Need help? Just reply to this email or visit our <a href=\"%{support_url}\">Support Center</a>."
      signoff: "Thanks for being part of our community,"
      signature: "- The SpeakAnyWay Team 💬"

