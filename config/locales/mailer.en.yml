      quickstart_item_2: "Create your first custom board (start with everyday core words)."
      quickstart_item_3: "Invite a Supporter so someone else can help (teacher/caregiver/therapist)."
      quickstart_item_4: "Export a board as a PDF + QR code for easy access anywhere."
      compare_heading: "Thinking about Pro?"
      compare_col_feature: "Feature"
      compare_col_basic: "Basic"
      compare_col_pro: "Pro"
      compare_feature_myspeak: "MySpeak+ (Safety info + instant access)"
      compare_feature_comm: "Communicator accounts (username + passcode)"
      compare_feature_boards: "Custom boards"
      compare_feature_supporters: "Supporter accounts"
      compare_feature_pdf: "Export boards as PDF + QR"
      compare_feature_analytics: "Advanced analytics"
      compare_feature_priority: "Priority support"
      pro_upgrade_heading: "Pro adds more room to grow 🚀"
      pro_upgrade_body_html: "Pro is built for families, classrooms, and professionals who need <strong>more communicator accounts</strong>, <strong>more supporters</strong>, and advanced tools."
      pro_upgrade_cta: "Compare Plans"
      pro_upgrade_pricing_html: "Current pricing: Basic <strong>%{basic_price}</strong> • Pro <strong>%{pro_price}</strong>. Cancel anytime."
      questions_html: "Questions? Just reply to this email or contact us at <a href=\"mailto:help@speakanyway.com\">help@speakanyway.com</a>."
      footer_thanks: "Thank you for choosing SpeakAnyWay 💜"
      footer_signature: "— The SpeakAnyWay Team"
      footer_visit: "Visit our website"

    welcome_pro_email:
      subject: "Welcome to SpeakAnyWay AAC — Pro plan"
      title: "Welcome to SpeakAnyWay Pro 🎉"
      subtitle: "Built for families, classrooms, and professionals supporting multiple communicators."
      greeting_with_name: "Hi %{name},"
      greeting_no_name: "Hi there,"
      intro_html: "Thanks for choosing <strong>SpeakAnyWay Pro</strong>! You now have powerful tools to support communication across home, school, therapy, and community settings."
      demo_heading: "⭐ New in Pro: Demo Communicator Accounts"
      demo_intro_html: "Your Pro plan includes <strong>%{count} Demo Communicator Accounts</strong> to start. These are designed specifically for <strong>modeling, organizing, and planning</strong> — without requiring a username or passcode."
      demo_item_1_html: "<strong>Model AAC</strong> during therapy or instruction without signing in"
      demo_item_2_html: "<strong>Organize boards</strong> by student, classroom, activity, or routine"
      demo_item_3_html: "Create <strong>lesson-specific or temporary boards</strong> (field trips, themes, events)"
      demo_item_4: "Safely demonstrate AAC to families or teams without touching a child's account"
      demo_item_5: "Plan and build boards ahead of time, then copy them where needed"
      demo_note: "Demo Communicators are perfect for SLPs, teachers, aides, and caregivers who need flexibility without friction."
      included_heading: "✨ What's included in Pro"
      included_paid_html: "<strong>%{count} Paid Communicator Accounts</strong> (username + passcode for switching devices and remote access)"
      included_demo_html: "<strong>%{count} Demo Communicator Accounts</strong> (no login — ideal for modeling and organization)"
      included_myspeak_html: "<strong>MySpeak+</strong> for every Paid Communicator (public access, emergency & medical info, instant QR access)"
      included_supporters_html: "<strong>Unlimited Supporters</strong> (read-only access for teachers, aides, caregivers, and family)"
      included_ai_html: "Full access to <strong>AI features</strong> (word suggestions, layouts, board generation)"
      included_analytics_html: "<strong>Advanced analytics</strong> to understand usage and progress"
      included_priority_html: "<strong>Priority support</strong> when you need help fast"
      included_pdf_html: "<strong>PDF + QR exports</strong> for portable AAC anywhere"
      setup_heading: "🚀 Get set up in minutes"
      setup_item_1: "Create your paid Communicator Accounts for individuals."
      setup_item_2: "Use Demo Communicators to model AAC or organize boards by theme."
      setup_item_3: "Build boards using AI for routines, classroom, or community use."
      setup_item_4_html: "Export boards as <strong>PDF + QR</strong> for offline or shared access."
      setup_item_5: "Invite Supporters so everyone stays aligned."
      cta: "Open Your Pro Dashboard"
      cta_fallback: "If the button doesn't work, copy this link:"
      tips_heading: "💡 Pro tips"
      tips_item_1: "Use Demo Communicators to test layouts before assigning them."
      tips_item_2: "Name demos by activity (e.g., \"Snack Time\", \"Morning Routine\")."
      tips_item_3: "Review analytics to refine real-world vocabulary use."
      footer_help_html: "Need help, onboarding support, or want to add more Communicators?<br>Visit <a href=\"https://app.speakanyway.com/pricing\" target=\"_blank\">pricing</a> or reply to this email. You can also reach us at <a href=\"mailto:help@speakanyway.com\">help@speakanyway.com</a>."
      footer_pricing_html: "Current Pro pricing: <strong>%{pro_price}</strong>. Cancel anytime."
      footer_signature: "— The SpeakAnyWay Team 💜"

