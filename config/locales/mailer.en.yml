      title: "Welcome to SpeakAnyWay"
      greeting_html: "Hi <strong>%{name}</strong>,"
      intro_html: "I'm so excited to officially welcome you to the <strong>SpeakAnyWay Pilot Partner Program</strong>! 💜 You're part of a small, hand-picked group helping us shape what this program — and this community — will become."
      pilot_note: "These first rounds are pilots, which means a few things might shift or improve along the way. Thank you for being flexible, curious, and open with your feedback as we grow together. We truly couldn't do this without you."
      signin_intro: "You can sign in to your account anytime by clicking the link below:"
      signin_link: "Sign in to your account"
      youre_in: "You're officially in — let's dive in!"
      step1_heading: "💡 Step 1: Getting Oriented (Communicator Accounts & Loaner slots)"
      step1_intro: "Inside SpeakAnyWay Pro, every Communicator slot is a real account a family can claim. You'll use them in two ways depending on the situation:"
      sponsored_heading: "✅ Communicator Accounts (Full Seats)"
      sponsored_intro: "Use a full seat when you're actively supporting a student/client long-term and want their account and progress kept separate."
      sponsored_item_1_html: "<strong>Separate sign-in</strong> for the communicator (they can log in on their own device)"
      sponsored_item_2_html: "<strong>Stats &amp; analytics</strong> (usage, trends, progress)"
      sponsored_item_3_html: "<strong>Full control</strong> over boards, settings, and access — and a claim link to hand off to the family"
      sponsored_item_4_html: "<strong>Invite supporters/supervisors</strong> (teachers, aides, family, therapists)"
      demo_heading: "🔄 Loaner Communicators (Hand-off + recycling)"
      demo_intro: "Every Communicator slot in Pro is Loaner-capable. Hand the credentials (or a claim link) to a family — when they upgrade to their own plan, the slot returns to your count so you can onboard the next communicator."
      demo_can_label: "Loaner Communicators support:"
      demo_can_item_1_html: "<strong>One-tap hand-off</strong> via a claim link — the family takes ownership of the account, boards and all"
      demo_can_item_2_html: "<strong>Supervisor link</strong> stays in place by default after hand-off (the family can disconnect anytime)"
      demo_not_label: "Just for trialing setups? Use a sandbox Communicator:"
      demo_not_item_1: "Sandbox Communicators are 1–2 no-login accounts for modeling, previewing, and building boards"
      demo_not_item_2: "Not intended to be claimed by a family — no separate sign-in, no MySpeak ID"
      demo_not_item_3: "Great for \"let me show you how this works\" demos without touching a real account"
      rule_of_thumb_html: "<strong>Quick rule of thumb:</strong> Long-term student/client → use a <strong>Communicator Account</strong> (lend it as a Loaner if appropriate; the slot recycles when the family upgrades). Just previewing or demoing → use a <strong>sandbox Communicator</strong>."
      step2_heading: "💡 Step 2: MySpeak ID (Free on every plan)"
      step2_intro_html: "Every Communicator Account also gets a <strong>MySpeak ID</strong> — a scannable, shareable safety surface with emergency contacts, medical notes, and a QR profile. It's free on every plan, including Free."
      step2_combo_html: "Together, Communicator Accounts and MySpeak ID combine <strong>communication + safety</strong> in one system."
      step2_seats_html: "<strong>5 Communicator Accounts are included</strong> with Loaner recycling — if you need more, please just let us know."
      step2_outreach: "♾️ Do you currently have any students or clients who need AAC but don't have access or have limited access? Please reach out — we would love to work with you to help get them what they need. 🫶"
      step2_etsy: "Check out our Etsy shop for printable AAC resources, ID tags, stickers, tattoos & more!"
      step3_heading: "🚀 Step 3: Explore the Partner Portal"
      step3_intro: "The Partner Portal includes step-by-step guides, role-based tips, and the official feedback form:"
      step3_cta: "GO TO PARTNER PORTAL"
      first_things_heading: "Suggested first things to try:"
      first_things_item_1: "Build a sample Communicator Board using AI Suggestions"
      first_things_item_2: "Export a PDF with a QR Quick Code and scan it on another device"
      first_things_item_3: "Create a MySpeak Account to test how emergency contact info displays when scanned"
      feedback_heading: "💭 Feedback Expectations"
      feedback_item_1: "One short feedback form per month (5-10 minutes)"
      feedback_item_2: "Optional feature or bug reports as you explore SpeakAnyWay"
      feedback_item_3: "Occasional quick polls or check-ins to guide improvements"
      feedback_outro: "We'll also send quick weekly updates during the pilot. You can reply anytime with feedback or ideas — no pressure, just open communication."
      dates_heading: "🗓️ Your 3-Month Partner Round"
      dates_label: "Dates:"
      dates_value: "%{start_date} - %{end_date}"
      dates_followup: "We'll check in near the end to review results and invite you to renew, reapply, or level up for the next round."
      help_html: "💌 <strong>Need help?</strong> Just reply to this email — we're here for you!"
      quick_note_html: "<strong>A quick note:</strong><br />This is our very first Partner Round, and we're learning right alongside you. Some things may shift or improve — thank you for being patient, flexible, and part of building something brand new."
      voice_html: "Your voice will directly shape the future of the <strong>SpeakAnyWay Partner Program</strong>. 💜"
      thanks: "Thank you for joining the journey!"
      signature: "Brittany"

