      footer_thanks: "Thank you for choosing SpeakAnyWay 💜"
      footer_signature: "— The SpeakAnyWay Team"
      footer_visit: "Visit our website"

    welcome_basic_email:
      subject: "Welcome to SpeakAnyWay AAC — Basic plan"
      title: "Welcome to SpeakAnyWay 🎉"
      badge: "Basic plan"
      preheader: "You're on the Basic plan — MySpeak+ included, plus your current plan limits are now unlocked in your account."
      greeting_with_name_html: "Hi %{name} — you're now on the <strong>Basic plan</strong>! MySpeak+ is included, and your account limits have been upgraded so you can do more right away."
      greeting_no_name_html: "Hi there — you're now on the <strong>Basic plan</strong>! MySpeak+ is included, and your account limits have been upgraded so you can do more right away."
      cta: "Open Your Dashboard"
      cta_fallback: "If the button doesn't work, copy this link:"
      do_now_heading: "What you can do on Basic"
      do_now_myspeak_html: "MySpeak+ included: add <strong>Safety info</strong> (emergency contacts & important notes) to your Communicator profile."
      do_now_comm_html:
        one: "Create up to <strong>%{count}</strong> communicator account (username + passcode for switching / remote access)."
        other: "Create up to <strong>%{count}</strong> communicator accounts (username + passcode for switching / remote access)."
      do_now_boards_html:
        one: "Create up to <strong>%{count}</strong> custom board (and share them with supporters)."
        other: "Create up to <strong>%{count}</strong> custom boards (and share them with supporters)."
      do_now_supporters_html:
        one: "Invite up to <strong>%{count}</strong> Supporter account (family/teacher/therapist access)."
        other: "Invite up to <strong>%{count}</strong> Supporter accounts (family/teacher/therapist access)."
      do_now_pdf_html: "<strong>Export boards as PDFs with QR codes</strong> for portable AAC — no device required."
      do_now_real_life: "Keep building boards that match real life: home, school, community, routines, and more."
      quickstart_heading: "Quick start (2 minutes)"
      quickstart_item_1: "Open your dashboard and update your MySpeak profile (Safety info)."
      quickstart_item_2: "Create your first custom board (start with everyday core words)."
      quickstart_item_3: "Invite a Supporter so someone else can help (teacher/caregiver/therapist)."
      quickstart_item_4: "Export a board as a PDF + QR code for easy access anywhere."
      compare_heading: "Thinking about Pro?"
      compare_col_feature: "Feature"
      compare_col_basic: "Basic"
      compare_col_pro: "Pro"
      compare_feature_myspeak: "MySpeak+ (Safety info + instant access)"
      compare_feature_comm: "Communicator accounts (username + passcode)"
      compare_feature_boards: "Custom boards"
      compare_feature_supporters: "Supporter accounts"
      compare_feature_pdf: "Export boards as PDF + QR"
      compare_feature_analytics: "Advanced analytics"
      compare_feature_priority: "Priority support"
      pro_upgrade_heading: "Pro adds more room to grow 🚀"
      pro_upgrade_body_html: "Pro is built for families, classrooms, and professionals who need <strong>more communicator accounts</strong>, <strong>more supporters</strong>, and advanced tools."
      pro_upgrade_cta: "Compare Plans"
      pro_upgrade_pricing_html: "Current pricing: Basic <strong>%{basic_price}</strong> • Pro <strong>%{pro_price}</strong>. Cancel anytime."
      questions_html: "Questions? Just reply to this email or contact us at <a href=\"mailto:help@speakanyway.com\">help@speakanyway.com</a>."
      footer_thanks: "Thank you for choosing SpeakAnyWay 💜"
      footer_signature: "— The SpeakAnyWay Team"
      footer_visit: "Visit our website"

    welcome_pro_email:
      subject: "Welcome to SpeakAnyWay AAC — Pro plan"
      title: "Welcome to SpeakAnyWay Pro 🎉"
      subtitle: "Built for families, classrooms, and professionals supporting multiple communicators."
      greeting_with_name: "Hi %{name},"
      greeting_no_name: "Hi there,"
      intro_html: "Thanks for choosing <strong>SpeakAnyWay Pro</strong>! You now have powerful tools to support communication across home, school, therapy, and community settings."
      loaner_heading: "⭐ New in Pro: Loaner Communicators"
      loaner_intro_html: "Your Pro plan includes <strong>%{count} Communicator slots</strong> that recycle when a family claims their own plan — so you can keep onboarding new communicators without growing your seat count."
      loaner_item_1_html: "<strong>Hand off in one tap</strong> — share a claim link and the family takes ownership of the account, boards and all"
      loaner_item_2_html: "<strong>Stay linked as supervisor</strong> by default after the hand-off (the family can disconnect anytime)"
      loaner_item_3_html: "<strong>Slot recycles</strong> when the family upgrades to their own plan — you're free to set up the next Communicator"
      loaner_note: "Loaner Communicators are perfect for SLPs, teachers, and families who lend AAC across a caseload — no extra paperwork, no juggling logins."
      included_heading: "✨ What's included in Pro"
      included_paid_html: "<strong>%{count} Communicator Accounts</strong> with Loaner recycling (slots recycle when a family claims their own plan)"
      included_demo_html: "<strong>1–2 sandbox Communicators</strong> for trialing setups (no login required)"
      included_myspeak_html: "<strong>MySpeak ID</strong> for every Communicator — QR profile, emergency &amp; medical info, free on every plan"
      included_supporters_html: "<strong>Unlimited Supporters</strong> (read-only access for teachers, aides, caregivers, and family)"
      included_ai_html: "<strong>1,500 AI credits/month</strong> and full access to AI features (word suggestions, layouts, board generation)"
      included_analytics_html: "<strong>Caseload dashboard</strong> to track all linked communicators, including ex-loaners now on their own accounts"
      included_priority_html: "<strong>Priority support</strong> when you need help fast"
      included_pdf_html: "<strong>PDF + QR exports</strong> for portable AAC anywhere"
      setup_heading: "🚀 Get set up in minutes"
      setup_item_1: "Create your Communicator Accounts and share claim links with the families you support."
      setup_item_2: "Use a sandbox Communicator to model AAC or trial board setups before assigning them."
      setup_item_3: "Build boards using AI for routines, classroom, or community use."
      setup_item_4_html: "Export boards as <strong>PDF + QR</strong> for offline or shared access."
      setup_item_5: "Invite Supporters so everyone stays aligned."
      cta: "Open Your Pro Dashboard"
      cta_fallback: "If the button doesn't work, copy this link:"
      tips_heading: "💡 Pro tips"
      tips_item_1: "Use a sandbox Communicator to test board layouts before handing off a Loaner."
      tips_item_2: "Name Loaner Communicators by the family or student so hand-offs stay organized."
      tips_item_3: "Review analytics to refine real-world vocabulary use."
      footer_help_html: "Need help, onboarding support, or want to add more Communicators?<br>Visit <a href=\"https://app.speakanyway.com/pricing\" target=\"_blank\">pricing</a> or reply to this email. You can also reach us at <a href=\"mailto:help@speakanyway.com\">help@speakanyway.com</a>."
      footer_pricing_html: "Current Pro pricing: <strong>%{pro_price}</strong>. Cancel anytime."
      footer_signature: "— The SpeakAnyWay Team 💜"

    welcome_invitation_email:
      subject: "You have been invited to join SpeakAnyWay AAC!"
      title: "You've Been Invited!"
      intro_html: "<strong>%{inviter_name}</strong> has invited you to join their team on <strong>SpeakAnyWay</strong>, and we're thrilled to have you!"
      description: "SpeakAnyWay helps you build and share communication boards with family members, therapists, or educators. Collaborate in real-time and make communication more effective for everyone."
      cta_intro: "To get started, simply click the button below to log in to your account:"
      cta: "Finish Setting Up Your Account"
      questions_html: "If you have any questions, feel free to <a href=\"mailto:help@speakanyway.com\">reach out to our team</a> — we're always here to help!"
      welcome_aboard: "Welcome aboard!"
      signature: "- The SpeakAnyWay Team"
      copyright_html: "&copy; %{year} SpeakAnyWay. All rights reserved."

    welcome_new_vendor_email:
      subject: "Welcome to SpeakAnyWay AAC - %{vendor_name}!"
      title: "Welcome to SpeakAnyWay, %{vendor_name}!"
      intro_html: "<strong>%{vendor_name}</strong>, thank you for joining SpeakAnyWay and helping make communication more inclusive for everyone."
      mission: "You're now offering an accessible menu that helps nonverbal, autistic, and speech-limited customers order independently—with confidence."
      how_to: "Here's how to get started:"
      live_menu_html: "Check your live menu at <a href=\"%{menu_url}\">%{menu_url}</a>"
      setup_cta: "View Your Setup Guide to Get Started"
      display_step: "Display it at your counter, register, or menu"
      community_step: "Let your community know you're communication-friendly!"
      dashboard_intro: "To manage your menu, view orders, and access resources, visit your vendor dashboard:"
      dashboard_link_label: "Vendor Dashboard:"
      dashboard_cta: "Visit Your Vendor Dashboard"
      help_html: "Need any help? Just <a href=\"mailto:help@speakanyway.com\">email our team</a> and we'll be happy to assist."
      thanks: "Thanks again for making a difference."
      signature: "- The SpeakAnyWay Team"
      copyright_html: "&copy; %{year} SpeakAnyWay. All rights reserved."

    welcome_to_organization_email:
      subject: "You have been invited to join %{organization_name} on SpeakAnyWay AAC!"
      title: "You've Been Invited to Join!"
      intro_html: "<strong>%{admin_name}</strong> has invited you to join <strong>%{organization_name}</strong> on SpeakAnyWay."
      excited: "We are excited to have you on board! SpeakAnyWay is a powerful tool designed to enhance communication for individuals with speech and language challenges."
      access_html: "As a member of the <strong>%{organization_name}</strong> organization, you will have access to a variety of features that will help you create and share personalized communication boards."
      cta_intro: "To get started, simply click the button below to log in to your account:"
      cta: "Finish Setting Up Your Account"
      questions_html: "If you have any questions, feel free to <a href=\"mailto:help@speakanyway.com\">reach out to our team</a> — we're always here to help!"
      welcome_aboard: "Welcome aboard!"
      signature: "- The SpeakAnyWay Team"
      copyright_html: "&copy; %{year} SpeakAnyWay. All rights reserved."

    welcome_with_claim_link_email:
      subject: "Welcome to MySpeak - Claim your profile!"
      title: "Welcome to MySpeak"
      badge: "MySpeak"
      preheader: "MySpeak is live — add safety info, share your QR page, and print a PDF with your QR code for on-the-go access."
      subtitle: "You're all set — let's make essential info accessible anywhere, instantly."
      greeting_with_name: "Hi %{name},"
      greeting_no_name: "Hi there,"
      intro_html: "Thanks for activating <strong>MySpeak</strong>! Your MySpeak profile is a scannable, shareable page that helps caregivers, teachers, and first responders get the right info <em>fast</em> — without needing to sign in."
      cta: "Open MySpeak"
      cta_fallback: "If the button doesn't work, copy this link:"
      what_heading: "What you get with MySpeak"
      what_item_1_html: "<strong>Safety info</strong> in your MySpeak profile — emergency contacts + key medical notes."
      what_item_2_html: "<strong>Your own QR page</strong> — scan to view essential info instantly (no login needed)."
      what_item_3_html: "<strong>PDF export with QR code</strong> — print for backpacks, wallets, binders, or lanyards."
      what_item_4_html: "<strong>Shareable link</strong> — send to trusted caregivers, teachers, and family."
      quickstart_heading: "Quick start (2 minutes)"
      quickstart_item_1_html: "Open MySpeak and add your <strong>emergency contacts</strong> + important info."
      quickstart_item_2_html: "Attach a helpful board (ex: <strong>needs</strong>, <strong>medical</strong>, <strong>calm down</strong>, <strong>home routine</strong>)."
      quickstart_item_3_html: "Print your <strong>PDF + QR</strong> or save the QR image for quick access."
      quickstart_tip: "Pro tip: Save your QR image as your phone lock screen so helpers can scan without unlocking."
      compare_heading: "Want to build boards + collaborate?"
      compare_col_feature: "Feature"
      compare_col_myspeak: "MySpeak"
      compare_col_basic: "Basic"
      compare_feature_profile: "MySpeak profile (public access)"
      compare_feature_safety: "Safety info + QR page + PDF export"
      compare_feature_login: "Communicator login (username + passcode)"
      compare_feature_boards: "Create custom boards"
      compare_feature_ai: "AI features"
      compare_feature_supporters: "Supporter accounts (read-only)"
      compare_value_included: "Included"
      compare_value_supporters: "%{count} included"
      upgrade_heading: "Upgrade to Basic (optional) 🚀"
      upgrade_body: "MySpeak is focused on fast-access info and QR sharing. Basic adds board creation, AI features, and Supporters for collaboration."
      upgrade_cta: "See Plans"
      questions_html: "Need help? Just reply to this email or contact us at <a href=\"mailto:help@speakanyway.com\">help@speakanyway.com</a>.<br> We've got your back 💜"
      footer_received: "You're receiving this because you created a MySpeak profile."
      footer_manage: "Manage your profile anytime in your account settings."

    delete_account_email:
      subject: "Confirm Your SpeakAnyWay AAC Account Deletion"
      header_brand: "SpeakAnyWay AAC"
      header_subtitle: "Account deletion confirmation"
      greeting: "Hi %{name},"
      intro: "We received a request to delete your SpeakAnyWay account. Before we proceed, we need to confirm that this request came from you."
      cta_intro: "To complete the deletion process, please click the button below:"
      cta: "Confirm account deletion"
      cta_fallback: "If the button doesn't work, copy and paste this link into your browser:"
      permanent: "Once you confirm, your account and all associated data will be permanently deleted. This action cannot be undone."
      expiry: "This confirmation link will expire in 2 hours. If you do not confirm within this time frame, your account will remain active & you will need to initiate the deletion process again."
      ignore: "If you did not request to delete your account, you can safely ignore this email—your account will remain active and no changes will be made."
      contact_html: "Need help? Contact us at <a href=\"mailto:%{support_email}\" style=\"color:#2563eb;text-decoration:underline;\">%{support_email}</a>."
      thanks: "Thanks,"
      signature: "The SpeakAnyWay Team"
      footer: "You're receiving this email because a deletion request was submitted for your SpeakAnyWay account. If this wasn't you, you can ignore this message."
      copyright_html: "© %{year} SpeakAnyWay. All rights reserved."

    confirm_update_email:
      subject: "Confirm your SpeakAnyWay email update"
      greeting: "Hello %{email}!"
      intro: "We're contacting you to notify you that your email update request is being processed. Please click the link below to confirm your new email address."
      old_email_label: "Old email:"
      new_email_label: "New email:"
      cta: "Confirm email update"
      ignore: "If you did not request this confirmation, please contact our support team immediately."
      thanks: "Thank you,"
      signature: "The SpeakAnyWay Team"

    temporary_login_email:
      subject: "Your Temporary Login Link for SpeakAnyWay AAC"
      title: "Temporary login to SpeakAnyWay"
      greeting_with_name: "Hi %{name},"
      greeting_no_name: "Hi,"
      intro: "A temporary login link has been created for your SpeakAnyWay account to help you get signed in quickly."
      instructions: "Click the button below to log in. You'll be asked to set a new password right away."
      cta: "Log in to SpeakAnyWay"
      link_info: "This link:"
      link_item_1: "Works one time only"
      link_item_2:
        one: "Expires in %{count} hour"
        other: "Expires in %{count} hours"
      link_item_3: "Will require you to set a new password"
      ignore: "If you didn't request this or no longer need access, you can safely ignore this email."
      signature: "— The SpeakAnyWay Team"

    message_notification_email:
      subject: "New message from %{sender_name}"
      title: "You've Got Mail!"
      intro_html: "<strong>%{sender_name}</strong> has sent you a message on SpeakAnyWay!"
      cta_intro: "To view the message, please click the button below:"
      cta: "View Message"
      sign_off: "Happy chatting!"
      copyright_html: "&copy; %{year} SpeakAnyWay. All rights reserved."

    subscription_canceled_email:
      subject: "Your SpeakAnyWay subscription was canceled"
      preheader: "Your subscription was canceled — your account has moved to the Free plan."
      title: "Your subscription was canceled"
      greeting_with_name: "Hi %{name},"
      greeting_no_name: "Hi there,"
      intro: "This confirms that your SpeakAnyWay subscription has been canceled. Your account is now on the Free plan."
      access_note: "Nothing was deleted. You keep your account, your communicators, and all of your boards — and communication itself keeps working."
      readonly_note: "On the Free plan you can actively edit one board; any additional boards become read-only (you can still open them and use them, you just can't edit them). We've automatically kept one board editable for you, and you can change which one any time from your dashboard."
      cta: "Resubscribe"
      cta_fallback: "If the button doesn't work, copy and paste this link:"
      questions_html: "Changed your mind or think this was a mistake? Just reply to this email or contact us at <a href=\"mailto:help@speakanyway.com\">help@speakanyway.com</a>."
      footer_thanks: "Thank you for being part of SpeakAnyWay 💜"
      footer_signature: "— The SpeakAnyWay Team"
      footer_visit: "Visit our website"

    license_renewal_offer_email:
      subject: "Your SpeakAnyWay license renews soon"
      preheader: "Your 5-year SpeakAnyWay license is wrapping up soon — here's how to renew."
      title: "Your license renews soon"
      greeting_with_name: "Hi %{name},"
      greeting_no_name: "Hi there,"
      intro: "Your 5-year SpeakAnyWay license is coming up on its renewal date."
      intro_with_date: "Your 5-year SpeakAnyWay license is set to end on %{date}."
      body_note: "Nothing changes today, and there's no card on file to charge — this is just a friendly heads-up so nothing sneaks up on you. When you're ready, you can renew any time and keep everything exactly as it is."
      cta: "Renew your license"
      cta_fallback: "If the button doesn't work, copy and paste this link:"
      questions_html: "Questions about renewing? Just reply to this email or reach us at <a href=\"mailto:help@speakanyway.com\">help@speakanyway.com</a>."
      footer_thanks: "Thank you for being part of SpeakAnyWay 💜"
      footer_signature: "— The SpeakAnyWay Team"
      footer_visit: "Visit our website"

    license_ended_email:
      subject: "Your SpeakAnyWay license has ended"
      preheader: "Your license ended — your account has moved to the Free plan. Nothing was deleted."
      title: "Your license has ended"
      greeting_with_name: "Hi %{name},"
      greeting_no_name: "Hi there,"
      intro: "Your 5-year SpeakAnyWay license has reached its end date, and your account is now on the Free plan."
      access_note: "Nothing was deleted. You keep your account, your communicators, and all of your boards — and communication itself keeps working."
      readonly_note: "On the Free plan you can actively edit one board; any additional boards become read-only (you can still open them and use them, you just can't edit them). We've automatically kept one board editable for you, and you can change which one any time from your dashboard."
      cta: "Renew your license"
      cta_fallback: "If the button doesn't work, copy and paste this link:"
      questions_html: "Want to renew or think this was a mistake? Just reply to this email or contact us at <a href=\"mailto:help@speakanyway.com\">help@speakanyway.com</a>."
      footer_thanks: "Thank you for being part of SpeakAnyWay 💜"
      footer_signature: "— The SpeakAnyWay Team"
      footer_visit: "Visit our website"

    payment_failed_email:
      subject: "We couldn't process your SpeakAnyWay payment"
      preheader: "Your last payment didn't go through — update your payment method to keep your plan."
      title: "We couldn't charge your card"
      greeting_with_name: "Hi %{name},"
      greeting_no_name: "Hi there,"
      intro: "We tried to process the payment for your SpeakAnyWay subscription, but it didn't go through."
      cta: "Update Payment Method"
      cta_fallback: "If the button doesn't work, copy and paste this link:"
      retry_note: "No need to worry just yet — your access continues for a few days while we automatically retry the charge. Updating your payment method now is the quickest way to keep everything running."
      cancel_note: "If the retries don't succeed, your subscription will be canceled automatically and your account will move to the Free plan."
      questions_html: "Questions? Just reply to this email or contact us at <a href=\"mailto:help@speakanyway.com\">help@speakanyway.com</a>."
      footer_signature: "— The SpeakAnyWay Team"
      footer_visit: "Visit our website"

  clinician_mailer:
