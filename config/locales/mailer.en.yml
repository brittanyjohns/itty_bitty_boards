      footer_thanks: "Thank you for the work you do 💜"
      footer_signature: "— The SpeakAnyWay Team"
    application_received_email:
      subject: "We got your SpeakAnyWay for Clinicians application"
      preheader: "Thanks for applying — we review each clinician application by hand."
      title: "Application received"
      greeting: "Hi %{name},"
      intro: "Thanks for applying to SpeakAnyWay for Clinicians."
      body_note: "We review every clinician application by hand to keep the program for verified clinicians, so it may take us a few days to get back to you. We'll email you the moment your Clinician account is ready — nothing more to do for now."
      questions_html: "Questions in the meantime? Just reply to this email or reach us at <a href=\"mailto:help@speakanyway.com\">help@speakanyway.com</a>."
    approved_email:
      subject: "Your SpeakAnyWay Clinician account is ready"
      preheader: "You're approved — your Clinician account is live."
      title: "You're approved 🎉"
      greeting: "Hi %{name},"
      intro: "Your SpeakAnyWay for Clinicians application has been approved — your Clinician account is live."
      body_note: "You now have Pro-level features plus a couple of loaner slots so you can set up families and hand a communicator off when they're ready. Sign in to get started."
      cta: "Sign in to SpeakAnyWay"
      questions_html: "Questions about your Clinician account? Just reply to this email or reach us at <a href=\"mailto:help@speakanyway.com\">help@speakanyway.com</a>."
    denied_email:
      subject: "About your SpeakAnyWay for Clinicians application"
      preheader: "An update on your clinician application."
      title: "About your application"
      greeting: "Hi %{name},"
      intro: "Thank you for your interest in SpeakAnyWay for Clinicians."
      body_note: "We weren't able to approve your Clinician account this time. If anything's changed or you'd like us to take another look, you're welcome to reply with more detail or apply again."
      questions_html: "Have a question or want us to reconsider? Just reply to this email or reach us at <a href=\"mailto:help@speakanyway.com\">help@speakanyway.com</a>."

  setup_mailer:
    myspeak_setup_email:
      subject: "MySpeak Setup Instructions"
      title: "Welcome to MySpeak!"
      greeting_with_name: "Hi %{name},"
      greeting_no_name: "Hi there,"
      intro: "We're so excited to have you join SpeakAnyWay. Your MySpeak profile helps others understand how you communicate best. Here's how to get set up:"
      getting_started_heading: "🛠️ Getting Started"
      step_1_html: "<strong>Log in:</strong> Visit %{link} and log into your account."
      step_2_html: "<strong>Go to MySpeak Settings:</strong> Click your profile icon and choose <em>\"MySpeak Settings.\"</em>"
