      footer_visit: "Visit our website"

    welcome_pro_email:
      subject: "Welcome to SpeakAnyWay AAC — Pro plan"
      title: "Welcome to SpeakAnyWay Pro 🎉"
      subtitle: "Built for families, classrooms, and professionals supporting multiple communicators."
      greeting_with_name: "Hi %{name},"
      greeting_no_name: "Hi there,"
      intro_html: "Thanks for choosing <strong>SpeakAnyWay Pro</strong>! You now have powerful tools to support communication across home, school, therapy, and community settings."
      loaner_heading: "⭐ New in Pro: Loaner Communicators"
      loaner_intro_html: "Your Pro plan includes <strong>%{count} Communicator slots</strong> that recycle when a family claims their own plan — so you can keep onboarding new communicators without growing your seat count."
      loaner_item_1_html: "<strong>Hand off in one tap</strong> — share a claim link and the family takes ownership of the account, boards and all"
      loaner_item_2_html: "<strong>Stay linked as supervisor</strong> by default after the hand-off (the family can disconnect anytime)"
      loaner_item_3_html: "<strong>Slot recycles</strong> when the family upgrades to their own plan — you're free to set up the next Communicator"
      loaner_note: "Loaner Communicators are perfect for SLPs, teachers, and families who lend AAC across a caseload — no extra paperwork, no juggling logins."
      included_heading: "✨ What's included in Pro"
      included_paid_html: "<strong>%{count} Communicator Accounts</strong> with Loaner recycling (slots recycle when a family claims their own plan)"
      included_demo_html: "<strong>1–2 sandbox Communicators</strong> for trialing setups (no login required)"
      included_myspeak_html: "<strong>MySpeak ID</strong> for every Communicator — QR profile, emergency &amp; medical info, free on every plan"
      included_supporters_html: "<strong>Unlimited Supporters</strong> (read-only access for teachers, aides, caregivers, and family)"
      included_ai_html: "<strong>1,500 AI credits/month</strong> and full access to AI features (word suggestions, layouts, board generation)"
      included_analytics_html: "<strong>Caseload dashboard</strong> to track all linked communicators, including ex-loaners now on their own accounts"
      included_priority_html: "<strong>Priority support</strong> when you need help fast"
      included_pdf_html: "<strong>PDF + QR exports</strong> for portable AAC anywhere"
      setup_heading: "🚀 Get set up in minutes"
      setup_item_1: "Create your Communicator Accounts and share claim links with the families you support."
      setup_item_2: "Use a sandbox Communicator to model AAC or trial board setups before assigning them."
      setup_item_3: "Build boards using AI for routines, classroom, or community use."
      setup_item_4_html: "Export boards as <strong>PDF + QR</strong> for offline or shared access."
      setup_item_5: "Invite Supporters so everyone stays aligned."
      cta: "Open Your Pro Dashboard"
      cta_fallback: "If the button doesn't work, copy this link:"
      tips_heading: "💡 Pro tips"
      tips_item_1: "Use a sandbox Communicator to test board layouts before handing off a Loaner."
      tips_item_2: "Name Loaner Communicators by the family or student so hand-offs stay organized."
      tips_item_3: "Review analytics to refine real-world vocabulary use."
      footer_help_html: "Need help, onboarding support, or want to add more Communicators?<br>Visit <a href=\"https://app.speakanyway.com/pricing\" target=\"_blank\">pricing</a> or reply to this email. You can also reach us at <a href=\"mailto:help@speakanyway.com\">help@speakanyway.com</a>."
      footer_pricing_html: "Current Pro pricing: <strong>%{pro_price}</strong>. Cancel anytime."
      footer_signature: "— The SpeakAnyWay Team 💜"

