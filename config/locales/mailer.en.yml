    delete_account_email:
      subject: "Confirm Your SpeakAnyWay AAC Account Deletion"
      header_brand: "SpeakAnyWay AAC"
      header_subtitle: "Account deletion confirmation"
      greeting: "Hi %{name},"
      intro: "We received a request to delete your SpeakAnyWay account. Before we proceed, we need to confirm that this request came from you."
      cta_intro: "To complete the deletion process, please click the button below:"
      cta: "Confirm account deletion"
      cta_fallback: "If the button doesn't work, copy and paste this link into your browser:"
      permanent: "Once you confirm, your account and all associated data will be permanently deleted. This action cannot be undone."
      expiry: "This confirmation link will expire in 2 hours. If you do not confirm within this time frame, your account will remain active & you will need to initiate the deletion process again."
      ignore: "If you did not request to delete your account, you can safely ignore this email—your account will remain active and no changes will be made."
