# Source of truth for which env vars get pushed to the Hatchbox staging app
# (ypk9e.hatchboxapp.com) by script/hatchbox/sync_env_vars.rb.
#
# Values are NOT stored here. They are read from ENV at runtime — the
# .github/workflows/staging-sync-env.yml workflow populates ENV from
# repo secrets, then runs the sync script.
#
# To add a new env var to staging:
#   1. Add the name here.
#   2. Wire it up in staging-sync-env.yml (either as a literal or from a secret).
#
# Vars that Hatchbox injects automatically (database/redis credentials,
# RAILS_ENV) are NOT listed here.
vars:
  # ---- Core Rails ----
  - STAGING                    # literal "true"
  - RAILS_MASTER_KEY           # optional; only needed for credentials.yml.enc features (e.g. GitHub Printables)
  - SECRET_KEY_BASE
  - DEVISE_JWT_SECRET_KEY
  - INTERNAL_API_KEY
  - DB_POOL
  - DB_TIMEOUT
  - RAILS_MAX_THREADS
  - WEB_CONCURRENCY

  # ---- App URLs ----
  - STAGING_HOST               # ypk9e.hatchboxapp.com (host only; read by production.rb + cors.rb)
  - API_URL                    # https://ypk9e.hatchboxapp.com
  - DOMAIN                     # https://ypk9e.hatchboxapp.com
  - FRONT_END_URL              # https://ypk9e.hatchboxapp.com
  - WEBHOOK_URL                # https://ypk9e.hatchboxapp.com/api/webhooks
  - PAY_WEBHOOK_URL            # https://ypk9e.hatchboxapp.com/pay/webhooks/stripe

  # ---- AWS / Active Storage ----
  # Staging uses local disk storage (ACTIVE_STORAGE_SERVICE=local). The AWS
  # creds remain set for sidekiq/polly/etc., and AWS_BUCKET is preserved in
  # case we switch back to S3. CDN_HOST is intentionally absent — was removed
  # from this manifest so the sync no longer pushes it. Delete it manually
  # from Hatchbox if it's still there.
  - AWS_ACCESS_KEY_ID
  - AWS_SECRET_ACCESS_KEY
  - AWS_REGION
  - AWS_BUCKET                 # itty-bitty-boards-staging (unused with local svc)
  - ACTIVE_STORAGE_SERVICE     # local

  # ---- Stripe (test mode) ----
  - STRIPE_PRIVATE_KEY
  - STRIPE_PUBLIC_KEY
  - STRIPE_WEBHOOK_SECRET
  - STRIPE_PAYMENT_METHOD_COLLECTION
  - STRIPE_FREE_PLAN_ID
  - STRIPE_PRICE_MYSPEAK
  - STRIPE_PRICE_MYSPEAK_YEAR
  - STRIPE_PRICE_BASIC
  - STRIPE_PRICE_BASIC_YEAR
  - STRIPE_PRICE_PRO
  - STRIPE_PRICE_PRO_YEAR
  - STRIPE_PRICE_PARTNER_PRO
  - STRIPE_PRICE_TOPUP_SMALL   # 100-credit pack  (AI credits Phase 2)
  - STRIPE_PRICE_TOPUP_MEDIUM  # 500-credit pack
  - STRIPE_PRICE_TOPUP_LARGE   # 1500-credit pack
  - ONE_DOLLAR_PRICE_ID
  - PRO_PLAN_URL

  # ---- OpenAI ----
  - OPENAI_ACCESS_TOKEN
  - OPENAI_IMAGE_MODEL
  - OPENAI_IMAGE_MODEL_STYLE
  - OPENAI_EDIT_IMAGE_MODEL
  - OPENAI_GTP_MODEL
  - OPENAI_QUICK_GTP_MODEL
  - BOARD_SCREENSHOT_VISION_MODEL
  - IMPORT_MAX_IMAGE_PX

  # ---- Third-party APIs ----
  - OPEN_SYMBOL_ACCESS_TOKEN
  - GOOGLE_CUSTOM_SEARCH_API_KEY
  - GOOGLE_CUSTOM_SEARCH_CX
  - SERP_PRIVATE_API_KEY

  # ---- Mailchimp ----
  - MAILCHIMP_API_KEY
  - MAILCHIMP_SERVER_PREFIX
  - MAILCHIMP_AUDIENCE_ID
  # Customer Journey triggers (off on staging unless MAILCHIMP_JOURNEYS_ENABLED=true).
  # All 6 journey keys mirror prod so the full set can be end-to-end tested on staging.
  - MAILCHIMP_JOURNEYS_ENABLED
  - MAILCHIMP_JOURNEY_WELCOME_ID
  - MAILCHIMP_JOURNEY_WELCOME_STEP
  - MAILCHIMP_JOURNEY_FIRST_BOARD_NUDGE_ID
  - MAILCHIMP_JOURNEY_FIRST_BOARD_NUDGE_STEP
  - MAILCHIMP_JOURNEY_HIT_LIMIT_ID
  - MAILCHIMP_JOURNEY_HIT_LIMIT_STEP
  - MAILCHIMP_JOURNEY_LEGACY_SIGNUP_NUDGE_ID
  - MAILCHIMP_JOURNEY_LEGACY_SIGNUP_NUDGE_STEP
  - MAILCHIMP_JOURNEY_TRIAL_WRAP_ID
  - MAILCHIMP_JOURNEY_TRIAL_WRAP_STEP
  - MAILCHIMP_JOURNEY_WIN_BACK_ID
  - MAILCHIMP_JOURNEY_WIN_BACK_STEP
  - MAILCHIMP_JOURNEY_SUBSCRIPTION_STARTED_ID
  - MAILCHIMP_JOURNEY_SUBSCRIPTION_STARTED_STEP

  # ---- SMTP (Gmail relay) ----
  - SMTP_USERNAME
  - SMTP_PASSWORD

  # ---- Plan limits ----
  - PREDICTIVE_DEFAULT_ID
  - FREE_BOARD_LIMIT
  - FREE_PAID_COMMUNICATOR_LIMIT
  - FREE_DEMO_COMMUNICATOR_LIMIT
  - FREE_AI_MONTHLY_LIMIT
  - MYSPEAK_BOARD_LIMIT
  - MYSPEAK_PAID_COMMUNICATOR_LIMIT
  - MYSPEAK_DEMO_COMMUNICATOR_LIMIT
  - MYSPEAK_AI_MONTHLY_LIMIT
  - BASIC_BOARD_LIMIT
  - BASIC_PAID_COMMUNICATOR_LIMIT
  - BASIC_DEMO_COMMUNICATOR_LIMIT
  - BASIC_AI_MONTHLY_LIMIT
  - PRO_BOARD_LIMIT
  - PRO_PAID_COMMUNICATOR_LIMIT
  - PRO_DEMO_COMMUNICATOR_LIMIT
  - PRO_AI_MONTHLY_LIMIT

# Vars in `vars` that may be left empty — the sync script will skip them
# rather than abort. Add a name here if it's truly optional for staging.
optional:
  - RAILS_MASTER_KEY
